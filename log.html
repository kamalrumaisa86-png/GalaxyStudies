<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Galaxy Studies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<style>
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #7d8d9c, #87CEFA);
        font-family: 'Georgia', serif;
    }
    .login-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,255,255,0.7);
        color: white;
        text-align: center;
        width: 100%;
        max-width: 400px;
    }
    .login-box h2 {
        margin-bottom: 30px;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }
    .form-control {
        border-radius: 10px;
        margin-bottom: 20px;
    }
    .btn-login {
        background: rgba(118, 125, 170, 0.8);
        color: black;
        font-weight: bold;
        border-radius: 10px;
        transition: background 0.3s, transform 0.2s;
    }
    .btn-login:hover {
        background: rgb(184, 209, 209);
        transform: scale(1.05);
    }
    footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #f0f0f0;
    }
</style>
</head>
<body>
<div class="login-box">
    <h2>Welcome to Galaxy Studies</h2>
    <form id="loginForm">
        <input type="text" id="username" class="form-control" placeholder="Enter your name" required>
        <button type="submit" class="btn btn-login btn-block">Enter</button>
    </form>
    <footer>Designed by <em>Rumaisa Kamal Safa</em> | 2026</footer>
</div>

<script>
    // Function to set a cookie
    function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        const expires = "expires=" + date.toUTCString();
        document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/";
    }

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // prevent default form submission
        const username = document.getElementById('username').value.trim();
        if(username) {
            setCookie('username', username, 7); // store username for 7 days
            window.location.href = 'index.html'; // redirect to next page
        }
    });
</script>
</body>
</html>
